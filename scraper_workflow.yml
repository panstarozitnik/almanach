name: Merkandi Daily Scraper + Deploy

on:
  schedule:
    - cron: "0 7 * * *"   # 7:00 UTC = 9:00 SK letný čas
  workflow_dispatch:       # manuálne spustenie z GitHub UI

permissions:
  contents: write          # pre commit data.json
  pages: write             # pre GitHub Pages deploy
  id-token: write          # pre GitHub Pages deploy

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Nastav Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Inštaluj závislosti
        run: pip install -r requirements.txt

      - name: Spusti scraper → vyprodukuje data.json
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python scraper.py

      - name: Commitni data.json späť do repozitára
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "data: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Priprav GitHub Pages výstup
        run: |
          mkdir -p _site
          cp dashboard.html _site/index.html
          cp data.json      _site/data.json

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
